version: '3.5'
services:
  pymix:
    image: pymix
    privileged: true
    restart: unless-stopped
    container_name: "pymix"
    #user: "501:20"
    ports:
      - 8002:8002
    volumes:
      - ./db:/pymix/db
      - user-updownloads:/user-updownloads
      - private-music:/private-music
      - private-staged:/private-staged
      - public-staged:/public-staged
      - /Users/lukepurnell/workspace/subbox:/subbox
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - APP_ENVIRONMENT=dev

    networks:
      - traefik_default

networks:
  traefik_default:
    name: traefik_default

volumes:
  user-updownloads:
    external: true
    name: user-updownloads
  private-staged:
    driver: local
    name: private-staged
  private-music:
    driver: local
    name: private-music
  public-staged:
    driver: local
    name: public-staged
