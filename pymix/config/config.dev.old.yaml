---
app_env: dev
rekordbox:
  xml_path: /Users/lukepurnell/workspace/subbox/rekordbox/rekordbox_empty.xml
  zip_name: 'subbox-export'
containers:
  subsonic:
    host: http://localhost:{port}
    version: 1.16.1
    music_path_base_to_remove: music/private
    serving_music_path_base: /Users/lukepurnell/workspace/subbox/private/{user}/nav_music
    docker_compose_file: /Users/lukepurnell/workspace/subbox/docker-compose/navidrome/docker-compose.old.yml
    env_file: /Users/lukepurnell/workspace/subbox/docker-compose/navidrome/env
  filebrowser:
    data: /Users/lukepurnell/workspace/subbox/docker-compose/filebrowser/data/users/{user}
    docker_compose_file: /Users/lukepurnell/workspace/subbox/docker-compose/filebrowser/docker-compose.old.yml
    env_file: /Users/lukepurnell/workspace/subbox/docker-compose/filebrowser/env
  beets:
    host: http://localhost:{port}
    data: /Users/lukepurnell/workspace/subbox/private/{user}/beets/download
    data_public: /Users/lukepurnell/workspace/subbox/public/beets/download
    docker_compose_file: /Users/lukepurnell/workspace/subbox/docker-compose/beets/docker-compose.old.yml
    env_file: /Users/lukepurnell/workspace/subbox/docker-compose/beets/env
    config_file_src: /Users/lukepurnell/workspace/subbox/beets/config/config.yaml
    config_file_dst: /Users/lukepurnell/workspace/subbox/private/{user}/beets/config/config.yaml
logs_directory: logs
user_root: /Users/lukepurnell/workspace/subbox/private/{user}
db:
  path: /Users/lukepurnell/PycharmProjects/pymix/db/user_db.json
max_number_of_users: 10
max_number_of_tracks: 1000
# number of seconds after which the export job will be updated with number of files written to zip during export job
update_job_period_s: 1